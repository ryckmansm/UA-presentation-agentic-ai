<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>
    <main class="shell">
      <section class="hero">
        <p class="kicker">Payment Workflow Demo</p>
        <h1>Checkout Lab</h1>
        <p>
          A tiny frontend for your testing-skills presentation. Submit a checkout and inspect the API
          result instantly.
        </p>
        <div class="health" id="health-pill" role="status" aria-live="polite">Checking API health...</div>
      </section>

      <section class="panel">
        <h2>Create Checkout</h2>
        <form id="checkout-form" novalidate>
          <label for="customerId">Customer ID</label>
          <input id="customerId" name="customerId" placeholder="student-1" required />

          <label for="subtotal">Subtotal (USD)</label>
          <input id="subtotal" name="subtotal" type="number" min="0" step="0.01" placeholder="120" required />

          <label for="couponCode">Coupon Code (optional)</label>
          <input id="couponCode" name="couponCode" placeholder="SAVE10" />

          <div class="form-footer">
            <button id="submit-btn" type="submit">Run Checkout</button>
            <small>Endpoint: <code>/checkout</code></small>
          </div>
        </form>
      </section>

      <section class="panel output">
        <h2>Result</h2>
        <pre id="result" aria-live="polite">Run a checkout to see response JSON...</pre>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
